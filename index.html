  const dirs=[
    "N","NNE","NE","ENE",
    "E","ESE","SE","SSE",
    "S","SSW","SW","WSW",
    "W","WNW","NW","NNW"
  ];
  return dirs[Math.round(degrees/22.5)%16];
}

function windArrow(degrees){
